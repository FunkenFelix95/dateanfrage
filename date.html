<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Date bestätigt ❤️</title>

  <style>

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);

      font-family: Arial, sans-serif;
    }

    .card {
      background: white;

      padding: 40px;

      border-radius: 25px;

      width: 90%;
      max-width: 500px;

      text-align: center;

      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      color: #ff4f81;
      margin-bottom: 15px;
    }

    p {
      color: #444;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    label {
      display: block;

      margin-top: 25px;
      margin-bottom: 8px;

      font-weight: bold;

      color: #ff4f81;
    }

    input {
      width: 90%;

      padding: 12px;

      border-radius: 12px;

      border: 1px solid #ccc;

      font-size: 1rem;
    }

    button {
      margin-top: 30px;

      padding: 15px 30px;

      border: none;
      border-radius: 15px;

      background: #ff4f81;

      color: white;

      font-size: 1.1rem;

      cursor: pointer;

      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;

      color: #ff4f81;

      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="card">

    <h1>Jaaa ❤️</h1>

    <p>
      Ich freue mich sehr über deine Entscheidung 🥰
      <br><br>
      Jetzt darfst du Datum und Uhrzeit
      für unser Date auswählen ❤️
    </p>

    <label for="date">
      Datum auswählen
    </label>

    <input type="date" id="date">

    <label for="time">
      Uhrzeit auswählen
    </label>

    <input type="time" id="time">

    <button onclick="sendDateMail()">
      Date bestätigen ❤️
    </button>

    <p id="result"></p>

  </div>

  <script>

    function sendDateMail() {

      const date =
        document.getElementById("date").value;

      const time =
        document.getElementById("time").value;

      const result =
        document.getElementById("result");

      if (date === "" || time === "") {

        result.innerHTML =
          "Bitte Datum und Uhrzeit auswählen ❤️";

        return;
      }

      const subject =
        encodeURIComponent("Date bestätigt ❤️");

      const body =
        encodeURIComponent(
          "Hallo ❤️\n\n" +
          "Ich habe unser Date bestätigt 🥰\n\n" +
          "Datum: " + date + "\n" +
          "Uhrzeit: " + time + "\n\n" +
          "Ich freue mich auf unser Date ❤️"
        );

      window.location.href =
        `mailto:?subject=${subject}&body=${body}`;
    }

  </script>

</body>

</html>
