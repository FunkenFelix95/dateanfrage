<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Date Anfrage ❤️</title>

  <style>

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #ff9a9e, #fad0c4);

      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;

      text-align: center;

      width: 90%;
      max-width: 500px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.2);

      position: relative;
    }

    h1 {
      color: #ff4f81;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      color: #444;
      margin-bottom: 30px;
    }

    .buttons {
      position: relative;
      height: 80px;
    }

    button {
      padding: 15px 30px;

      border: none;
      border-radius: 15px;

      font-size: 1.1rem;

      cursor: pointer;
    }

    #yesButton {
      background: #ff4f81;
      color: white;

      margin-right: 20px;
    }

    #yesButton:hover {
      transform: scale(1.05);
    }

    #noButton {
      background: #ddd;

      position: absolute;

      left: 260px;
      top: 0;

      transition: left 0.15s ease, top 0.15s ease;
    }

  </style>
</head>

<body>

  <div class="card">

    <h1>Hey meine Liebe ❤️</h1>

    <p>
      Hättest du Lust auf ein Date mit mir? 🥺
    </p>

    <div class="buttons">

      <button id="yesButton">
        Ja ❤️
      </button>

      <button id="noButton">
        Nein
      </button>

    </div>

  </div>

  <script>

    const noButton = document.getElementById("noButton");
    const yesButton = document.getElementById("yesButton");

    yesButton.addEventListener("click", () => {

      window.location.href = "date.html";

    });

    function moveButton() {

      const maxX = window.innerWidth - noButton.offsetWidth - 50;
      const maxY = window.innerHeight - noButton.offsetHeight - 50;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noButton.style.position = "fixed";

      noButton.style.left = randomX + "px";
      noButton.style.top = randomY + "px";
    }

    noButton.addEventListener("mouseenter", moveButton);

  </script>

</body>

</html>
